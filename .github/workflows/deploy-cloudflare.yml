name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: nexmonie/package-lock.json

      - name: Install dependencies
        working-directory: nexmonie
        run: npm install --legacy-peer-deps

      - name: Install @opennextjs/cloudflare + wrangler
        working-directory: nexmonie
        run: npm install --save-dev @opennextjs/cloudflare@1.20.1 "wrangler@3" --legacy-peer-deps

      - name: Build with OpenNext for Cloudflare
        working-directory: nexmonie
        run: npx @opennextjs/cloudflare build
        env:
          NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
          NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}
          NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID }}

      - name: Prepare Pages dist (full .open-next structure, no pre-bundling)
        working-directory: nexmonie
        run: |
          mkdir -p .pages-dist
          cp -r .open-next/assets/. .pages-dist/
          [ -d .open-next/server-functions ] && cp -r .open-next/server-functions .pages-dist/server-functions
          [ -d .open-next/middleware ]        && cp -r .open-next/middleware        .pages-dist/middleware
          [ -d .open-next/cloudflare ]        && cp -r .open-next/cloudflare        .pages-dist/cloudflare
          [ -d .open-next/.build ]            && cp -r .open-next/.build            .pages-dist/.build
          cp .open-next/worker.js .pages-dist/_worker.js
          echo "=== worker head ===" && head -5 .pages-dist/_worker.js
          echo "=== worker tail ===" && tail -5 .pages-dist/_worker.js
          echo "=== size ===" && du -sh .pages-dist/

      - name: Deploy to Cloudflare Pages
        working-directory: nexmonie
        run: npx wrangler pages deploy .pages-dist --project-name=final-nexmonie --commit-dirty=true --no-bundle
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
