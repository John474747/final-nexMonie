name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: nexmonie/package-lock.json

      - name: Install dependencies
        working-directory: nexmonie
        run: npm install --legacy-peer-deps

      - name: Install @opennextjs/cloudflare + wrangler
        working-directory: nexmonie
        run: npm install --save-dev @opennextjs/cloudflare@1.20.1 wrangler --legacy-peer-deps

      - name: Build
        working-directory: nexmonie
        run: npx @opennextjs/cloudflare build
        env:
          NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
          NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}
          NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID }}

      - name: Prepare Pages output (_worker.js in .open-next root)
        working-directory: nexmonie
        run: cp .open-next/worker.js .open-next/_worker.js

      - name: Deploy to Cloudflare Pages
        working-directory: nexmonie
        run: >
          npx wrangler pages deploy .open-next
          --project-name=final-nexmonie
          --commit-dirty=true
          --compatibility-date=2024-09-23
          --compatibility-flags=nodejs_compat
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
