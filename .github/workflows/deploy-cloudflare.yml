name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: nexmonie/package-lock.json

      - name: Install dependencies
        working-directory: nexmonie
        run: npm install --legacy-peer-deps

      - name: Install @opennextjs/cloudflare + wrangler + esbuild
        working-directory: nexmonie
        run: npm install --save-dev @opennextjs/cloudflare@1.20.1 "wrangler@3" esbuild --legacy-peer-deps

      - name: Build with OpenNext
        working-directory: nexmonie
        run: npx @opennextjs/cloudflare build
        env:
          NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
          NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}
          NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID }}

      - name: Bundle worker into single file for Cloudflare Pages
        working-directory: nexmonie
        run: |
          mkdir -p .pages-dist
          cp -r .open-next/assets/. .pages-dist/
          node - << 'EOF'
          const esbuild = require('esbuild');
          const { builtinModules } = require('module');
          const external = [
            ...builtinModules,
            ...builtinModules.map(m => `node:${m}`),
            'cloudflare:*',
          ];
          esbuild.build({
            entryPoints: ['.open-next/worker.js'],
            outfile: '.pages-dist/_worker.js',
            bundle: true,
            format: 'esm',
            target: 'esnext',
            conditions: ['workerd', 'worker', 'browser'],
            external,
            minify: true,
            logLevel: 'info',
          }).then(() => {
            const { execSync } = require('child_process');
            console.log('Bundle size:', execSync('du -sh .pages-dist/_worker.js').toString().trim());
          }).catch(e => { console.error(e); process.exit(1); });
          EOF

      - name: Deploy to Cloudflare Pages
        working-directory: nexmonie
        run: npx wrangler pages deploy .pages-dist --project-name=final-nexmonie --commit-dirty=true --no-bundle
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
